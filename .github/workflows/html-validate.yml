name: HTML + Links Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator
        run: npm install -g html-validate@9.x linkinator@6.x http-server@14

      - name: Validate HTML
        run: html-validate index.html 404.html "blog/**/*.html"

      - name: Serve site
        run: |
          http-server . -p 8080 --silent &
          sleep 2

      - name: Check links (internal + external)
        run: linkinator http://127.0.0.1:8080/ --config linkinator.config.json
